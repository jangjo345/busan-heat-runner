<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>부산 러너 🏃 — 폭염 7일 생존기</title>
<style>
  :root{
    --cream:#fdf3ea; --card:#fffdfb; --ink:#5a5566; --ink-soft:#9a93a6;
    --peach:#ffb4a2; --peach-d:#ff9a86; --pink:#ffb3c6; --mint:#bde3d8;
    --water:#74c7ec; --temp-ok:#7bd88f; --temp-warn:#ffd166; --temp-hot:#ff7a85;
    --stam:#ffcf6b; --morale:#ff9ec4;
    --shadow:0 12px 30px rgba(150,120,120,.18); --shadow-s:0 4px 14px rgba(150,120,120,.16);
    --r:26px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Pretendard",system-ui,-apple-system,"Segoe UI",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -10%, #fff7f0 0%, var(--cream) 55%, #f6e7da 100%) fixed;
    display:flex; align-items:flex-start; justify-content:center;
    min-height:100%; padding:18px 12px 36px;
    letter-spacing:.2px;
  }
  #app{ width:100%; max-width:440px; }

  /* ── 헤더: 진행도 ── */
  .topbar{display:flex; align-items:center; justify-content:space-between; margin:2px 4px 12px;}
  .title{font-weight:800; font-size:18px; color:#ff7a59; display:flex; gap:7px; align-items:center;}
  .title small{font-weight:700; color:var(--ink-soft); font-size:12px;}
  .icon-btn{
    border:none; background:#fff; box-shadow:var(--shadow-s); width:38px;height:38px;border-radius:14px;
    font-size:17px; cursor:pointer; color:var(--ink); transition:transform .12s;
  }
  .icon-btn:active{transform:scale(.9);}
  .daytrack{display:flex; gap:6px; margin:0 4px 12px;}
  .daytrack .seg{flex:1; height:8px; border-radius:99px; background:#eadfd5; transition:background .4s, transform .3s;}
  .daytrack .seg.done{background:linear-gradient(90deg,#ffc6a8,#ff9a86);}
  .daytrack .seg.now{background:linear-gradient(90deg,#ffd6c0,#ff7a59); transform:scaleY(1.5);}

  /* ── 무대(하늘 + 펫) ── */
  .stage{
    position:relative; height:300px; border-radius:var(--r); overflow:hidden;
    box-shadow:var(--shadow); transition:background 1.1s ease;
  }
  .stage .band-label{
    position:absolute; top:12px; left:14px; z-index:6;
    background:rgba(255,255,255,.78); backdrop-filter:blur(4px);
    padding:6px 13px; border-radius:99px; font-weight:800; font-size:14px; color:#6a5f55;
    box-shadow:var(--shadow-s); display:flex; gap:7px; align-items:center;
  }
  .stage .dday{
    position:absolute; top:12px; right:14px; z-index:6;
    background:rgba(255,255,255,.78); backdrop-filter:blur(4px);
    padding:6px 12px; border-radius:99px; font-weight:800; font-size:12px; color:#ff7a59;
    box-shadow:var(--shadow-s);
  }
  .sun{position:absolute; width:90px;height:90px;border-radius:50%; right:-6px; top:-6px; z-index:1;
    background:radial-gradient(circle at 50% 50%, #fff6c0 0%, #ffe079 45%, rgba(255,224,121,0) 72%);
    filter:blur(1px); opacity:0; transition:opacity 1s, transform 1s; transform:scale(.6);}
  .moon{position:absolute; width:52px;height:52px;border-radius:50%; right:24px; top:22px; z-index:1;
    background:radial-gradient(circle at 38% 38%, #fffdf2 0%, #f3edd4 60%, #e8e0bf 100%);
    box-shadow:0 0 24px rgba(255,255,230,.6); opacity:0; transition:opacity 1s;}
  .stars{position:absolute; inset:0; z-index:1; opacity:0; transition:opacity 1s;}
  .star{position:absolute; width:3px;height:3px;border-radius:50%; background:#fff;
    box-shadow:0 0 6px #fff; animation:tw 2.4s infinite ease-in-out;}
  @keyframes tw{0%,100%{opacity:.25;}50%{opacity:1;}}
  .shimmer{position:absolute; inset:0; z-index:4; opacity:0; transition:opacity .9s; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,.0) 0px, rgba(255,255,255,.16) 2px, rgba(255,255,255,0) 4px);
    mix-blend-mode:screen; animation:shimmer 1.1s linear infinite;}
  @keyframes shimmer{0%{transform:translateY(0)}100%{transform:translateY(-6px)}}
  .ground{position:absolute; left:0;right:0;bottom:0; height:58px; z-index:2;
    background:linear-gradient(180deg, rgba(255,255,255,.0), rgba(255,255,255,.35));
    border-top:2px dashed rgba(255,255,255,.5);}

  /* 펫 */
  .pet-wrap{position:absolute; left:50%; bottom:34px; transform:translateX(-50%); z-index:5;
    width:210px; height:210px; animation:bob 2.4s ease-in-out infinite;}
  .pet-wrap.happy{animation:bobFast 1s ease-in-out infinite;}
  .pet-wrap.hot{animation:wobble 1.2s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-9px)}}
  @keyframes bobFast{0%,100%{transform:translateX(-50%) translateY(0) rotate(-2deg)}50%{transform:translateX(-50%) translateY(-14px) rotate(2deg)}}
  @keyframes wobble{0%,100%{transform:translateX(-50%) rotate(-3deg)}50%{transform:translateX(-50%) rotate(3deg)}}
  .pet-wrap svg{width:100%;height:100%; filter:drop-shadow(0 10px 8px rgba(120,90,90,.18));}
  .bubble{position:absolute; left:50%; top:-2px; transform:translateX(-50%);
    background:#fff; color:#6a5f55; font-weight:700; font-size:13px; padding:7px 13px; border-radius:16px;
    box-shadow:var(--shadow-s); white-space:nowrap; z-index:7; opacity:0; transition:opacity .4s, top .4s;}
  .bubble:after{content:""; position:absolute; left:50%; bottom:-7px; transform:translateX(-50%);
    border:7px solid transparent; border-top-color:#fff; border-bottom:0;}
  .bubble.show{opacity:1; top:-10px;}

  /* fx 레이어 (땀/비/불꽃) */
  .fx{position:absolute; inset:0; z-index:6; pointer-events:none; overflow:hidden;}
  .drop{position:absolute; width:7px;height:10px; background:var(--water); border-radius:0 99px 99px 99px;
    transform:rotate(45deg); opacity:.85; animation:fall 1s linear forwards;}
  @keyframes fall{0%{opacity:0; transform:rotate(45deg) translateY(-6px)}20%{opacity:.9}100%{opacity:0; transform:rotate(45deg) translateY(60px)}}
  .rain{position:absolute; top:-12px; width:2px; height:16px; background:rgba(180,220,255,.8); border-radius:2px;
    animation:rainfall .7s linear infinite;}
  @keyframes rainfall{0%{transform:translateY(-20px)}100%{transform:translateY(320px)}}
  .firework{position:absolute; width:6px;height:6px;border-radius:50%; animation:fw 1.1s ease-out forwards;}
  @keyframes fw{0%{transform:scale(.2); opacity:1}100%{transform:scale(7); opacity:0}}

  /* ── 스탯 게이지 ── */
  .stats{margin:14px 2px 0; display:grid; gap:9px;}
  .stat{display:flex; align-items:center; gap:9px; position:relative;}
  .stat .lab{width:54px; font-weight:800; font-size:13px; color:#7a7088; display:flex; gap:4px; align-items:center;}
  .bar{flex:1; height:16px; border-radius:99px; background:#efe6dd; overflow:hidden; box-shadow:inset 0 1px 2px rgba(0,0,0,.05);}
  .bar > i{display:block; height:100%; width:0%; border-radius:99px; transition:width .6s cubic-bezier(.3,1.2,.5,1), background .4s;}
  .val{width:42px; text-align:right; font-weight:800; font-size:13px; color:#8a8096; font-variant-numeric:tabular-nums;}
  .float{position:absolute; right:48px; top:-4px; font-weight:900; font-size:14px; opacity:0;}
  .float.go{animation:floatup 1.1s ease-out forwards;}
  @keyframes floatup{0%{opacity:0; transform:translateY(4px)}15%{opacity:1}100%{opacity:0; transform:translateY(-20px)}}
  .tempzone{position:absolute; left:54px; right:42px; top:0; bottom:0; pointer-events:none;}

  /* ── 장비 슬롯 ── */
  .gear{display:flex; gap:8px; margin:13px 2px 0;}
  .slot{flex:1; background:#fff; border:2px dashed #e7d8cc; border-radius:15px; padding:7px 4px; text-align:center;
    transition:.25s; min-height:50px; display:flex; flex-direction:column; justify-content:center;}
  .slot.on{border-style:solid; border-color:#ffd0a8; box-shadow:var(--shadow-s);}
  .slot .si{font-size:18px; line-height:1;}
  .slot .sn{font-size:9.5px; font-weight:700; color:#8a8096; margin-top:3px; line-height:1.15;}
  .slot .slotlabel{font-size:9px; color:#c9bcb0; font-weight:700;}

  /* ── 이벤트 카드 ── */
  .panel{margin:14px 0 0; background:var(--card); border-radius:var(--r); box-shadow:var(--shadow); padding:17px 17px 16px;}
  .ev-title{font-weight:800; font-size:16px; color:#ff7a59; margin:0 0 7px; display:flex; gap:7px; align-items:center;}
  .ev-text{font-size:14px; line-height:1.6; color:#6c6478; white-space:pre-line; margin:0 0 4px;}
  .result{font-size:13.5px; line-height:1.55; color:#7a7088; background:#fff6ef; border-radius:14px; padding:11px 13px; margin:4px 0 0;}
  .choices{display:grid; gap:10px; margin-top:14px;}
  .choice{
    border:none; cursor:pointer; text-align:left; font-family:inherit;
    background:linear-gradient(180deg,#fff,#fff6ef); color:#5f5670; font-weight:700; font-size:14.5px;
    padding:15px 16px; border-radius:18px; box-shadow:var(--shadow-s); transition:transform .12s, box-shadow .2s;
    border:2px solid #ffe4d3; line-height:1.35;
  }
  .choice .eff{display:block; font-weight:700; font-size:11.5px; color:#b9a99c; margin-top:5px;}
  .choice:hover{transform:translateY(-2px); box-shadow:0 8px 18px rgba(255,150,120,.22);}
  .choice:active{transform:scale(.98);}
  .choice.grant{background:linear-gradient(180deg,#fff,#eafaf4); border-color:#b9ead9;}
  .cont{
    width:100%; border:none; cursor:pointer; font-family:inherit; margin-top:14px;
    background:linear-gradient(180deg,#ffb27a,#ff8f5e); color:#fff; font-weight:800; font-size:16px;
    padding:15px; border-radius:18px; box-shadow:0 8px 18px rgba(255,140,90,.35); transition:transform .12s;
  }
  .cont:active{transform:scale(.97);}

  /* ── 토스트(획득) ── */
  .toast{position:fixed; left:50%; top:24px; transform:translateX(-50%) translateY(-30px);
    background:linear-gradient(135deg,#3ec79b,#2bb38a); color:#fff; padding:13px 18px; border-radius:18px;
    box-shadow:0 12px 28px rgba(40,170,130,.4); font-weight:800; z-index:50; opacity:0; transition:.4s; max-width:90%;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast small{display:block; font-weight:600; font-size:11.5px; opacity:.92; margin-top:3px;}

  /* ── 모달(이름/엔딩) ── */
  .modal{position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center; padding:20px;
    background:rgba(90,70,80,.32); backdrop-filter:blur(3px);}
  .modal.show{display:flex; animation:fadein .3s;}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .sheet{background:var(--card); border-radius:30px; box-shadow:var(--shadow); padding:26px 24px; width:100%; max-width:380px; text-align:center;}
  .sheet h2{margin:6px 0 4px; font-size:22px; color:#ff7a59;}
  .sheet p{font-size:14px; color:#7a7088; line-height:1.6; white-space:pre-line; margin:8px 0 0;}
  .sheet .art{font-size:42px; margin:6px 0 2px;}
  .sheet input{width:100%; margin-top:16px; padding:14px 16px; border-radius:16px; border:2px solid #ffe0cf;
    font-family:inherit; font-size:16px; color:#5f5670; text-align:center; outline:none;}
  .sheet input:focus{border-color:#ffb27a;}
  .sheet .endstats{font-size:12.5px; color:#9a93a6; margin-top:14px; line-height:1.7;}
  .primary{width:100%; border:none; cursor:pointer; font-family:inherit; margin-top:18px;
    background:linear-gradient(180deg,#ffb27a,#ff8f5e); color:#fff; font-weight:800; font-size:17px;
    padding:15px; border-radius:18px; box-shadow:0 8px 18px rgba(255,140,90,.35); transition:transform .12s;}
  .primary:active{transform:scale(.97);}
  .ghost{background:none; border:none; color:#b6aaba; font-weight:700; margin-top:12px; cursor:pointer; font-size:13px;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="title">🏃 부산 러너 <small>폭염 7일 생존기</small></div>
    <button class="icon-btn" id="soundBtn" title="소리">🔊</button>
  </div>
  <div class="daytrack" id="daytrack"></div>

  <div class="stage" id="stage">
    <div class="sun" id="sun"></div>
    <div class="moon" id="moon"></div>
    <div class="stars" id="stars"></div>
    <div class="shimmer" id="shimmer"></div>
    <div class="band-label" id="bandLabel">🌙 1일차 새벽</div>
    <div class="dday" id="dday">D-6</div>
    <div class="fx" id="fx"></div>
    <div class="ground"></div>
    <div class="pet-wrap" id="petWrap">
      <div class="bubble" id="bubble"></div>
      <div id="pet"></div>
    </div>
  </div>

  <div class="stats" id="stats"></div>
  <div class="gear" id="gear"></div>
  <div class="panel" id="panel"></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal" id="nameModal">
  <div class="sheet">
    <div class="art">🐣</div>
    <h2>러너 펫 만들기</h2>
    <p>부산의 한여름, 7일을 버텨낼 작은 러너예요.<br>이름을 지어주세요.</p>
    <input id="nameInput" maxlength="8" placeholder="바람" />
    <button class="primary" id="startBtn">함께 달리기 🏃</button>
  </div>
</div>

<div class="modal" id="endModal">
  <div class="sheet">
    <div class="art" id="endArt">🏁</div>
    <h2 id="endTitle"></h2>
    <p id="endText"></p>
    <div class="endstats" id="endStats"></div>
    <button class="primary" id="againBtn">다시 도전 🔁</button>
  </div>
</div>

<script>
/* =========================================================================
   게임 데이터 — 여기 숫자/문구만 바꾸면 튜닝됩니다.
   (CLI 버전의 data/*.json 과 동일한 내용)
   ========================================================================= */
const BANDS = [
  { key:'새벽', icon:'🌙', kind:'recover', sky:['#c9b6e8','#ffd6c0'],
    drift:{수분:-1,체온:-2,체력:4,사기:1}, blurb:'선선한 새벽 공기. 달리기 좋은 시간.' },
  { key:'오전', icon:'🌤️', kind:'mild', sky:['#bfe3ff','#fef6e4'],
    drift:{수분:-2,체온:1,체력:1,사기:0}, blurb:'해가 오르기 시작한다.' },
  { key:'정오', icon:'☀️', kind:'danger', sky:['#a9e8ff','#fffbe6'],
    drift:{수분:-5,체온:4,체력:-1,사기:-1}, blurb:'정오의 직사광선. 가장 위험한 시간대.' },
  { key:'오후', icon:'🔥', kind:'danger', sky:['#ffd29b','#ffae7b'],
    drift:{수분:-4,체온:3,체력:-1,사기:0}, blurb:'아스팔트가 달아오른다.' },
  { key:'저녁', icon:'🌇', kind:'recover', sky:['#ffb6c1','#c39bd3'],
    drift:{수분:-1,체온:-2,체력:2,사기:1}, blurb:'열기가 한풀 꺾였다.' },
  { key:'밤', icon:'🌃', kind:'recover', sky:['#33408a','#16213e'],
    drift:{수분:-1,체온:-2,체력:3,사기:1}, blurb:'시원한 밤. 회복의 시간.' },
];
const LAST_DAY = 7;

const ITEMS = {
  flexer_cap:{ name:'Flexer 캡', slot:'머리', icon:'🧢', spec:'UPF 차단·47g·packable', desc:'정오·오후 체온 상승 -30%',
    mods:[{kind:'scale',stat:'체온',phase:'drift',bands:['정오','오후'],direction:'up',factor:0.7}] },
  frosty_gaiter:{ name:'Frosty 넥 게이터', slot:'목', icon:'🧣', spec:'흡습·냉감 원단', desc:'턴마다 체온 -1',
    mods:[{kind:'perTurn',stat:'체온',delta:-1}] },
  calf_sleeve:{ name:'카프 슬리브', slot:'다리', icon:'🦵', spec:'단계별 압박', desc:'달릴 때 체력 소모 -20%',
    mods:[{kind:'scale',stat:'체력',phase:'effect',direction:'down',factor:0.8}] },
  dual_run_shorts:{ name:'듀얼레이어 런쇼츠', slot:'하의', icon:'🩳', spec:'2겹·무마찰', desc:'턴마다 사기 +1',
    mods:[{kind:'perTurn',stat:'사기',delta:1}] },
  summer_hairband:{ name:'여름 헤어밴드', slot:'머리', icon:'🎀', spec:'땀 흡수 밴드(캡과 택일)', desc:'수분 소모 -15%',
    mods:[{kind:'scale',stat:'수분',phase:'both',direction:'down',factor:0.85}] },
};
const SLOTS = ['머리','목','다리','하의'];
const SLOT_EMPTY = {머리:'🎽',목:'·',다리:'·',하의:'·'};

const ENDINGS = {
  complete:{ title:'완주!', art:'🏁🎉', text:'7일간의 폭염을 모두 버텨냈다.\n{name}은(는) 부산의 한여름을 완주한 전설의 러너 펫이 되었다!' },
  retire_heat:{ title:'열사병 리타이어', art:'🥵💦', text:'체온이 40도를 넘었다.\n{name}은(는) {day}일차에 쓰러졌다… 그늘과 물을 더 챙겼어야 했어.' },
  retire_dehydration:{ title:'탈수 리타이어', art:'💧😵', text:'수분이 바닥났다.\n{name}의 다리가 {day}일차에 풀려버렸다… 시원할 때 물을 비축했어야 했는데.' },
  retire_morale:{ title:'포기', art:'💔', text:'사기가 0이 되었다.\n{name}은(는) {day}일차에 더는 달릴 이유를 찾지 못했다…' },
};

const EVENTS = [
  { id:'noon_sun', title:'직사광선', icon:'☀️', when:{bands:['정오','오후'],days:[]},
    text:'해가 정수리를 때린다. 달궈진 아스팔트에서 아지랑이가 피어오른다.',
    choices:[
      {label:'편의점 그늘로 대피한다',icon:'🏪',effects:{체온:-6,수분:4,체력:4,사기:-1},result:'에어컨 바람 앞에 선다. 후끈한 몸이 한결 식는다.'},
      {label:'차가운 이온음료를 들이켠다',icon:'🥤',effects:{수분:26,체온:-3,사기:2},result:'차가운 음료가 목을 타고 넘어간다. 살 것 같다.'},
      {label:'그래도 페이스를 유지하며 달린다',icon:'🏃',effects:{체온:5,체력:-10,수분:-8,사기:9},result:'독한 러너다… 기록은 지켰지만 몸이 펄펄 끓는다.'},
    ]},
  { id:'cool_breeze', title:'선선한 바람', icon:'🍃', when:{bands:['새벽','저녁','밤'],days:[]},
    text:'해가 없는 시간. 바람이 선선하다. 컨디션을 끌어올리기 좋은 때다.',
    choices:[
      {label:'해운대 해변을 가볍게 조깅한다',icon:'🏖️',effects:{체력:-8,체온:1,사기:13,수분:-5},result:'파도 소리와 함께 가볍게 달린다. 기분이 좋아진다.'},
      {label:'스트레칭하며 푹 쉰다',icon:'🧘',effects:{체력:16,체온:-2,사기:3},result:'근육을 풀고 충분히 휴식한다.'},
      {label:'물을 충분히 마셔둔다',icon:'💧',effects:{수분:26,사기:1},result:'시원할 때 수분을 미리 비축해 둔다.'},

const clampN=(v,lo,hi)=>Math.max(lo,Math.min(hi,Math.round(v)));
function newPet(name){return {name,수분:80,체온:37,체력:80,사기:70};}
function clampPet(p){p.수분=clampN(p.수분,0,100);p.체력=clampN(p.체력,0,100);p.사기=clampN(p.사기,0,100);p.체온=clampN(p.체온,30,45);}
function applyEffects(p,e={}){for(const k in e){if(p[k]===undefined)continue;p[k]+=e[k];}clampPet(p);}
function applyPassive(p,e={}){applyEffects(p,e); if(p.체온>39)p.체온=39; if(p.수분<1)p.수분=1; if(p.사기<1)p.사기=1;}
function checkRetire(p){ if(p.체온>=40)return 'heat'; if(p.수분<=0)return 'dehydration'; if(p.사기<=0)return 'morale'; return null; }
const RETKEY={heat:'retire_heat',dehydration:'retire_dehydration',morale:'retire_morale'};

function activeMods(eq){const m=[];for(const s of SLOTS){const id=eq[s];const it=id?ITEMS[id]:null;if(it&&it.mods)m.push(...it.mods);}return m;}
function scaleEffects(effects={},eq,ctx={}){const mods=activeMods(eq).filter(m=>m.kind==='scale');const out={};
  for(const stat in effects){let v=effects[stat];for(const m of mods){if(m.stat!==stat)continue;
    if(m.phase!=='both'&&m.phase!==ctx.phase)continue;
    if(m.bands&&m.bands.length&&(!ctx.band||!m.bands.includes(ctx.band.key)))continue;
    if(m.direction==='up'&&!(v>0))continue; if(m.direction==='down'&&!(v<0))continue; v*=m.factor;}
    out[stat]=v;} return out;}
function perTurnEffects(eq){const mods=activeMods(eq).filter(m=>m.kind==='perTurn');const out={};for(const m of mods)out[m.stat]=(out[m.stat]||0)+m.delta;return out;}
function mergeEffects(a={},b={}){const o={...a};for(const k in b)o[k]=(o[k]||0)+b[k];return o;}
function owns(eq,id){return SLOTS.some(s=>eq[s]===id);}
function equip(eq,id){const it=ITEMS[id];if(!it)return null;const rep=eq[it.slot];eq[it.slot]=id;return{item:it,replacedId:rep};}

function pickEvent(state,band){
  const seen=state.seenSupply||[];
  const usable=e=>!(e.supply&&seen.includes(e.id));
  const match=e=>{const w=e.when||{};const b=!w.bands||!w.bands.length||w.bands.includes(band.key);const d=!w.days||!w.days.length||w.days.includes(state.day);return b&&d;};
  let pool=EVENTS.filter(e=>match(e)&&usable(e));
  if(!pool.length)pool=EVENTS.filter(e=>{const w=e.when||{};return(!w.bands||!w.bands.length)&&(!w.days||!w.days.length)&&usable(e);});
  if(!pool.length)return DEFAULT_EVENT;
  const supplies=pool.filter(e=>e.supply); if(supplies.length)return choose(supplies,state);
  const dayLocked=pool.filter(e=>e.when&&e.when.days&&e.when.days.length); if(dayLocked.length)return choose(dayLocked,state);
  return choose(pool,state);
}
function choose(pool,state){let c=pool; if(pool.length>1&&state.lastEventId){const f=pool.filter(e=>e.id!==state.lastEventId);if(f.length)c=f;} return c[Math.floor(Math.random()*c.length)];}

let actx=null, soundOn=true;
function beep(freq,dur=0.1,type='sine',vol=0.05){ if(!soundOn)return; try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();o.type=type;o.frequency.value=freq;g.gain.value=vol;
  o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);o.stop(actx.currentTime+dur);}catch(e){} }
function melody(notes){let t=0;for(const[f,d]of notes){setTimeout(()=>beep(f,d,'triangle',0.06),t*1000);t+=d*0.9;}}

  if(p.체력<=20)return 'tired';
  if(p.사기<=20)return 'sad';
  if(p.사기>=80&&p.체온<=38)return 'happy';
  return 'calm';
}

    '<path d="M70 96 q6 10 0 20" stroke="#9fd6ff" stroke-width="5" fill="none" stroke-linecap="round" opacity=".9"><animate attributeName="opacity" values="1;.3;1" dur="1.1s" repeatCount="indefinite"/></path>':'';
  // 눈
  if(m==='happy'){eyes='<path d="M86 116 q12 -13 24 0" stroke="#5b4a45" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M130 116 q12 -13 24 0" stroke="#5b4a45" stroke-width="5" fill="none" stroke-linecap="round"/>';}
  else if(m==='hot'){eyes='<path d="M86 112 l20 14 M106 112 l-20 14" stroke="#5b4a45" stroke-width="4.5" stroke-linecap="round"/><path d="M134 112 l20 14 M154 112 l-20 14" stroke="#5b4a45" stroke-width="4.5" stroke-linecap="round"/>';}
  else if(m==='sad'){eyes='<path d="M86 122 q12 -10 24 0" stroke="#5b4a45" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M130 122 q12 -10 24 0" stroke="#5b4a45" stroke-width="5" fill="none" stroke-linecap="round"/>'; extra+='<path d="M150 128 q5 14 -2 20" stroke="#9fd6ff" stroke-width="5" fill="none" stroke-linecap="round"/>';}
  else if(m==='thirsty'){eyes='<ellipse cx="98" cy="120" rx="7" ry="5" fill="#5b4a45"/><ellipse cx="142" cy="120" rx="7" ry="5" fill="#5b4a45"/>';}
  else if(m==='tired'){eyes='<path d="M88 119 h20 M132 119 h20" stroke="#5b4a45" stroke-width="5" stroke-linecap="round"/>';}
  else {eyes='<circle cx="98" cy="119" r="7.5" fill="#5b4a45"/><circle cx="142" cy="119" r="7.5" fill="#5b4a45"/><circle cx="100.5" cy="116.5" r="2.5" fill="#fff"/><circle cx="144.5" cy="116.5" r="2.5" fill="#fff"/>';}
  // 입
  if(m==='happy')mouth='<path d="M104 142 q16 18 32 0" stroke="#c4625a" stroke-width="4" fill="#ffb0a0" stroke-linecap="round"/>';
  else if(m==='hot')mouth='<ellipse cx="120" cy="146" rx="11" ry="8" fill="#c4625a"/><path d="M111 146 q9 6 18 0" stroke="#ff9a8a" stroke-width="3" fill="none"/>';
  else if(m==='sad')mouth='<path d="M106 150 q14 -12 28 0" stroke="#c4625a" stroke-width="4" fill="none" stroke-linecap="round"/>';
  else if(m==='thirsty')mouth='<ellipse cx="120" cy="146" rx="6" ry="6" fill="#c4625a"/>';
  else if(m==='tired')mouth='<ellipse cx="120" cy="148" rx="9" ry="7" fill="#c4625a"/><path d="M120 152 q4 8 8 6" stroke="#ff9a8a" stroke-width="3" fill="none" stroke-linecap="round"/>';
  else mouth='<path d="M108 143 q12 11 24 0" stroke="#c4625a" stroke-width="4" fill="none" stroke-linecap="round"/>';
  // 볼터치
  const cheek=(m==='hot')?'#ff8a8a':'#ffb0bd';
  const cheekO=(m==='hot')?'.85':'.6';
  // 반짝(행복)
  if(m==='happy')extra+='<g fill="#fff3a8"><path d="M168 70 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3z"/><path d="M62 84 l2 5 5 2 -5 2 -2 5 -2 -5 -5 -2 5 -2z"/></g>';

  // 장비 오버레이
  let head='', neck='', legs='', shorts='';
  if(eq.머리==='flexer_cap')head='<g><path d="M70 78 q50 -46 100 0 q-50 -18 -100 0z" fill="#2ec4b6"/><path d="M118 76 q56 -6 60 8 q-30 -2 -60 2z" fill="#26a89b"/><circle cx="120" cy="62" r="6" fill="#1f8a80"/></g>';
  else if(eq.머리==='summer_hairband')head='<rect x="74" y="96" width="92" height="11" rx="5" fill="#ff6b9d"/><rect x="74" y="96" width="92" height="4" rx="2" fill="#ff9ec0"/>';
  if(eq.목==='frosty_gaiter')neck='<path d="M78 162 q42 26 84 0 l0 16 q-42 24 -84 0z" fill="#8ecae6"/><path d="M78 162 q42 26 84 0" stroke="#5fb0d6" stroke-width="3" fill="none"/>';
  if(eq.다리==='calf_sleeve')legs='<rect x="96" y="198" width="20" height="20" rx="6" fill="#4895ef"/><rect x="126" y="198" width="20" height="20" rx="6" fill="#4895ef"/>';
  if(eq.하의==='dual_run_shorts')shorts='<path d="M84 178 q36 18 72 0 l4 22 q-40 16 -80 0z" fill="#5a2a82"/><path d="M118 188 l0 18" stroke="#7e4aa8" stroke-width="3"/>';

  return `<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="106" cy="210" rx="14" ry="20" fill="#f3c4a4"/><ellipse cx="134" cy="210" rx="14" ry="20" fill="#f3c4a4"/>
    ${legs}
    <ellipse cx="120" cy="140" rx="74" ry="76" fill="${body}"/>
    <ellipse cx="120" cy="150" rx="52" ry="50" fill="#fff" opacity=".35"/>
    <circle cx="64" cy="82" r="15" fill="${body}"/><circle cx="176" cy="82" r="15" fill="${body}"/>
    ${shorts}${neck}
    <ellipse cx="92" cy="142" rx="11" ry="8" fill="${cheek}" opacity="${cheekO}"/>
    <ellipse cx="148" cy="142" rx="11" ry="8" fill="${cheek}" opacity="${cheekO}"/>
    ${eyes}${mouth}${extra}${ex}
    ${head}
  </svg>`;
}

/* =========================================================================
   렌더링
   ========================================================================= */
const $=id=>document.getElementById(id);
function band(){return BANDS[state.bandIndex];}

function renderScene(){
  const b=band();
  $('stage').style.background=`linear-gradient(180deg, ${b.sky[0]} 0%, ${b.sky[1]} 100%)`;
  $('bandLabel').textContent=`${b.icon} ${state.day}일차 ${b.key}`;
  $('dday').textContent=`D-${Math.max(0,LAST_DAY-state.day)}`;
  const danger=b.kind==='danger';
  $('sun').style.opacity=(b.key==='정오'||b.key==='오후'||b.key==='오전')?'1':'0';
  $('sun').style.transform=(b.key==='정오')?'scale(1.15)':'scale(.85)';
  $('moon').style.opacity=(b.key==='밤')?'1':'0';
  $('stars').style.opacity=(b.key==='밤')?'1':'0';
  $('shimmer').style.opacity=danger&&state.pet.체온>=37?'.8':'0';
  // 펫
  const m=moodOf(state.pet);
  $('pet').innerHTML=petSVG(state.pet,state.equipment);
  const pw=$('petWrap'); pw.className='pet-wrap'+(m==='happy'?' happy':m==='hot'?' hot':'');
  // 땀방울
  if(state.pet.체온>=38||m==='tired'||m==='thirsty') spawnDrops();
}
let starsBuilt=false;
function buildStars(){if(starsBuilt)return;starsBuilt=true;const s=$('stars');for(let i=0;i<26;i++){const d=document.createElement('div');d.className='star';d.style.left=Math.random()*100+'%';d.style.top=Math.random()*62+'%';d.style.animationDelay=(Math.random()*2.4)+'s';s.appendChild(d);}}
function spawnDrops(){const fx=$('fx');for(let i=0;i<2;i++){const d=document.createElement('div');d.className='drop';d.style.left=(38+Math.random()*24)+'%';d.style.top='42%';d.style.animationDelay=(Math.random()*0.6)+'s';fx.appendChild(d);setTimeout(()=>d.remove(),1100);}}
function weatherFor(ev){
  const fx=$('fx');
  if(ev&&ev.id==='sudden_shower'){for(let i=0;i<40;i++){const r=document.createElement('div');r.className='rain';r.style.left=Math.random()*100+'%';r.style.animationDelay=(Math.random())+'s';r.style.opacity=.5+Math.random()*.5;fx.appendChild(r);}setTimeout(()=>fx.querySelectorAll('.rain').forEach(e=>e.remove()),4000);}
  if(ev&&ev.id==='gwangalli_fireworks'){const cols=['#ff7a85','#ffd166','#74c7ec','#b9ead9','#ff9ec4'];let n=0;const t=setInterval(()=>{for(let i=0;i<12;i++){const f=document.createElement('div');f.className='firework';f.style.left=(20+Math.random()*60)+'%';f.style.top=(10+Math.random()*40)+'%';f.style.background=cols[i%cols.length];fx.appendChild(f);setTimeout(()=>f.remove(),1100);}if(++n>4)clearInterval(t);},700);}
}

function renderDaytrack(){const t=$('daytrack');t.innerHTML='';for(let d=1;d<=LAST_DAY;d++){const s=document.createElement('div');s.className='seg'+(d<state.day?' done':d===state.day?' now':'');t.appendChild(s);}}

const STAT_META={
  수분:{icon:'💧',color:'var(--water)',max:100},
  체온:{icon:'🌡️',color:'',max:100},
  체력:{icon:'⚡',color:'var(--stam)',max:100},
  사기:{icon:'💛',color:'var(--morale)',max:100},
};
function tempColor(t){ if(t>=40)return 'var(--temp-hot)'; if(t>=39)return '#ff9a85'; if(t>=38)return 'var(--temp-warn)'; if(t>=36)return 'var(--temp-ok)'; return '#8fd3ff'; }
function renderStats(prev){
  const s=$('stats'); if(!s.dataset.built){ s.innerHTML=['수분','체온','체력','사기'].map(k=>`
    <div class="stat" data-k="${k}">
      <div class="lab">${STAT_META[k].icon}${k}</div>
      <div class="bar"><i id="bar-${k}"></i></div>
      <div class="val" id="val-${k}"></div>
      <div class="float" id="flt-${k}"></div>
    </div>`).join(''); s.dataset.built='1'; }
  for(const k of ['수분','체온','체력','사기']){
    const p=state.pet[k]; let pct,col,valtxt;
    if(k==='체온'){pct=Math.max(0,Math.min(100,(p-30)/15*100)); col=tempColor(p); valtxt=p+'°';}
    else {pct=p; col=STAT_META[k].color; valtxt=p;}
    $('bar-'+k).style.width=pct+'%'; $('bar-'+k).style.background=col; $('val-'+k).textContent=valtxt;
    if(prev){const d=p-prev[k]; if(d){const f=$('flt-'+k); f.textContent=(d>0?'+':'')+d; f.style.color=d>0?'#3ec79b':'#ff7a85'; f.classList.remove('go'); void f.offsetWidth; f.classList.add('go');}}
  }
}

function renderGear(){
  const g=$('gear'); g.innerHTML=SLOTS.map(slot=>{const id=state.equipment[slot];const it=id?ITEMS[id]:null;
    return `<div class="slot ${it?'on':''}"><div class="si">${it?it.icon:SLOT_EMPTY[slot]}</div><div class="${it?'sn':'slotlabel'}">${it?it.name:slot}</div></div>`;}).join('');
}

function renderEvent(ev){
  currentEvent=ev; phase='choosing';
  const b=band();
  $('panel').innerHTML=`
    <div class="ev-title">${ev.icon||'🃏'} ${ev.title}</div>
    <div class="ev-text">${ev.text}</div>
    <div class="choices">${ev.choices.map((c,i)=>`
      <button class="choice ${c.grant?'grant':''}" data-i="${i}">
        ${c.icon?c.icon+' ':''}${c.label}
        ${c.sub?`<span class="eff">✦ ${c.sub}</span>`:''}
      </button>`).join('')}</div>`;
  $('panel').querySelectorAll('.choice').forEach(btn=>btn.addEventListener('click',()=>onChoice(+btn.dataset.i)));
  // 펫 말풍선
  showBubble();
}
function showBubble(){const m=moodOf(state.pet);const lines=MOOD_LINE[m];const txt=lines[Math.floor(Math.random()*lines.length)];const b=$('bubble');b.textContent=txt;b.classList.add('show');setTimeout(()=>b.classList.remove('show'),2600);}

function showAcquire(item,replaced){
  const t=$('toast');
  t.innerHTML=`✨ 장비 획득! ${item.icon} <b>${item.name}</b><small>${item.spec} → ${item.desc}${replaced?('  ·  '+replaced.name+' 교체'):''}</small>`;
  t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2800);
}

function onChoice(i){
  if(phase!=='choosing')return;
  const ev=currentEvent, c=ev.choices[i];
  const prev={...state.pet};
  beep(620,0.09,'sine',0.05);
  const fx=scaleEffects(c.effects||{},state.equipment,{phase:'effect',band:band()});
  applyEffects(state.pet,fx);
  // 장비 획득
  if(c.grant){const r=equip(state.equipment,c.grant); if(r){showAcquire(r.item,r.replacedId?ITEMS[r.replacedId]:null); melody([[523,0.1],[659,0.1],[784,0.16]]);}}
  if(ev.supply&&!state.seenSupply.includes(ev.id))state.seenSupply.push(ev.id);
  state.lastEventId=ev.id; state.turns=(state.turns||0)+1;

  renderScene(); renderStats(prev); renderGear();

  // 결과 + 계속 버튼
  phase='result';
  const reason=checkRetire(state.pet);
  const effTxt=fmtEff(fx);
  $('panel').innerHTML=`
    <div class="ev-title">${ev.icon||'🃏'} ${ev.title}</div>
    <div class="result">${c.result||'…'} ${effTxt?`<br><span style="color:#b9a99c;font-size:12px">${effTxt}</span>`:''}</div>`;
  if(reason){ setTimeout(()=>endGame(reason),900); return; }
  const cont=document.createElement('button'); cont.className='cont'; cont.textContent='계속 ▶';
  cont.addEventListener('click',nextTurn); $('panel').appendChild(cont);
  // 저장은 턴 경계(startTurn)에서만 → 이어하기 시 항상 깔끔한 "선택 대기" 상태로 복원.
}
function fmtEff(e){const parts=[];for(const k in e){const d=Math.round(e[k]);if(!d)continue;parts.push(`${k} ${d>0?'+':''}${d}`);}return parts.length?'( '+parts.join('  ')+' )':'';}

function nextTurn(){
  beep(520,0.07,'sine',0.04);
  // 시간 진행
  state.bandIndex++; if(state.bandIndex>=BANDS.length){state.bandIndex=0;state.day++;}
  save();
  startTurn();
}

function startTurn(){
  if(state.day>LAST_DAY){endGame('complete');return;}
  const b=band();
  const prev={...state.pet};
  const drift=scaleEffects(b.drift,state.equipment,{phase:'drift',band:b});
  const turn=perTurnEffects(state.equipment);
  applyPassive(state.pet,mergeEffects(drift,turn));
  renderDaytrack(); renderScene(); renderStats(prev); renderGear();
  const ev=pickEvent(state,b);
  weatherFor(ev);
  renderEvent(ev);
  save();
}

function endGame(reasonOrComplete){
  phase='ended'; clearSave();
  const key=reasonOrComplete==='complete'?'complete':RETKEY[reasonOrComplete];
  const e=ENDINGS[key]; const p=state.pet; const day=Math.min(state.day,LAST_DAY);
  if(key==='complete'){melody([[523,0.14],[659,0.14],[784,0.14],[1047,0.28]]);} else {beep(180,0.5,'sawtooth',0.05);}
  $('endArt').textContent=e.art;
  $('endTitle').textContent=e.title;
  $('endText').textContent=e.text.replaceAll('{name}',p.name).replaceAll('{day}',day);
  const gear=SLOTS.map(s=>state.equipment[s]).filter(Boolean).map(id=>ITEMS[id].name);
  $('endStats').innerHTML=`버틴 시간: <b>${day}일차</b><br>수분 ${p.수분} · 체온 ${p.체온}° · 체력 ${p.체력} · 사기 ${p.사기}`+(gear.length?`<br>최종 장비: ${gear.join(' · ')}`:'<br>맨몸 완주');
  $('endModal').classList.add('show');
}

/* =========================================================================
   부팅
   ========================================================================= */
function startNewGame(name){
  state={pet:newPet(name||'바람'),day:1,bandIndex:0,lastEventId:null,turns:0,equipment:emptyEq(),seenSupply:[]};
  save(); startTurn();
}
function boot(){
  buildStars();
  const saved=loadSave();
  if(saved){ state=saved;
    // 이어하기: 현재 턴 다시 그림(패시브 중복 방지 위해 startTurn 대신 현 상태 렌더 + 이벤트)
    renderDaytrack(); renderScene(); renderStats(null); renderGear();
    const ev=pickEvent(state,band()); weatherFor(ev); renderEvent(ev);
  } else {
    $('nameModal').classList.add('show');
    setTimeout(()=>$('nameInput').focus(),200);
  }
}
$('startBtn').addEventListener('click',()=>{const n=$('nameInput').value.trim()||'바람';$('nameModal').classList.remove('show');beep(659,0.12,'triangle',0.06);startNewGame(n);});
$('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('startBtn').click();});
$('againBtn').addEventListener('click',()=>{$('endModal').classList.remove('show');$('nameModal').classList.add('show');setTimeout(()=>$('nameInput').focus(),200);});
$('soundBtn').addEventListener('click',()=>{soundOn=!soundOn;$('soundBtn').textContent=soundOn?'🔊':'🔇';if(soundOn)beep(700,0.1,'triangle',0.05);});
boot();
</script>
